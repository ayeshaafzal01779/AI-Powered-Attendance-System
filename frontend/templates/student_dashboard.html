<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard | Tri-AI Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/student-dashboard.css">
    <!-- HTML5 QR Code Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

<div class="header">
    <div class="header-left">
        <h1>AI Powered Attendance System</h1>
    </div>
    <div class="header-right">
        <div class="user-info">
            <i class="fa-solid fa-user-graduate"></i>
            <span>Student: <span id="userName">Loading...</span></span>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">
    <!-- CARDS -->
    <div class="cards">
        <div class="card green">
            <div class="card-content">
                <div>
                    <h3>Overall Attendance</h3>
                    <p id="overallAttendance">--%</p>
                </div>
                <i class="fa-solid fa-chart-line card-icon"></i>
            </div>
        </div>
        <div class="card orange">
            <div class="card-content">
                <div>
                    <h3>This Month</h3>
                    <p id="monthAttendance">--%</p>
                </div>
                <i class="fa-solid fa-calendar-check card-icon"></i>
            </div>
        </div>
        <div class="card blue">
            <div class="card-content">
                <div>
                    <h3>Classes Attended</h3>
                    <p id="classesAttended">-- / --</p>
                </div>
                <i class="fa-solid fa-user-check card-icon"></i>
            </div>
        </div>
    </div>

    <!-- CHART -->
    <div class="section">
        <h3><i class="fas fa-chart-line"></i> Attendance Trend</h3>
        <canvas id="attendanceChart"></canvas>
    </div>

    <!-- MARK ATTENDANCE -->
    <div class="section mark-attendance">
        <h3><i class="fas fa-fingerprint"></i> Mark Attendance</h3>
        <button class="qr-btn" onclick="openQRScanner()">
            <i class="fas fa-qrcode"></i> Scan QR Code
        </button>
        <button class="face-btn" onclick="markFace()">
            <i class="fas fa-face-smile"></i> Facial Recognition
        </button>
    </div>

    <!-- COURSE WISE ATTENDANCE -->
    <div class="section">
        <h3><i class="fas fa-book"></i> Course-wise Attendance</h3>
        <div id="courseAttendanceList">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i> Loading...
            </div>
        </div>
    </div>

    <!-- ALERT -->
    <div id="alertBox" class="alert hidden">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="alertMessage"></span>
    </div>
</div>

<!-- QR Scanner Modal -->
<div id="qrModal" class="qr-modal hidden">
    <div class="qr-modal-content">
        <div class="qr-modal-header">
            <h3><i class="fas fa-qrcode"></i> Scan QR Code</h3>
            <button class="qr-modal-close" onclick="closeQRScanner()">&times;</button>
        </div>
        <div class="qr-modal-body">
            <div id="qr-reader" style="width: 100%;"></div>
            <div id="qr-status" class="qr-status">Position QR code in frame</div>
        </div>
        <div class="qr-modal-footer">
            <button class="btn-cancel" onclick="closeQRScanner()">Cancel</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/static/js/student-dashboard.js"></script>
</body>
</html>
