<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard | Tri-AI Attendance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="static/css/teacher-dashboard.css">
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>AI Powered Attendance System</h1>
        </div>
        <div class="header-right">
            <div class="teacher-info">
                <i class="fas fa-chalkboard-teacher"></i>
                <span>Teacher: <span id="teacherName">Loading...</span></span>
            </div>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <h2><i class="fas fa-book me-2"></i> My Courses</h2>
            <div class="course-list" id="courseList">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i> Loading courses...
                </div>
            </div>
        </div>

        <div class="main-content">
            <div id="activeSession" class="active-session hidden">
                <div class="session-header">
                    <div class="session-title">
                        Active Session: <span id="activeCourseName">---</span>
                    </div>
                    <div class="present-count">
                        Present: <span id="presentCount">0</span> / <span id="totalStudents">0</span>
                    </div>
                </div>
                <div class="attendance-stats">
                    <div class="mode-selector">
                        <button class="mode-btn active" onclick="setMode('QR', this)">QR Code</button>
                        <button class="mode-btn" onclick="setMode('Face', this)">Face Recognition</button>
                        <button class="mode-btn" onclick="setMode('Manual', this)">Manual Entry</button>
                    </div>
                </div>
                <div class="session-controls">
                    <button class="control-btn close-btn" onclick="closeSession()">
                        <i class="fas fa-stop"></i> Close Session
                    </button>
                </div>
                <div class="refresh-info">
                    <i class="fas fa-sync-alt"></i> Auto-refreshing every 5 seconds
                </div>
            </div>

            <div id="qrSection" class="qr-section hidden">
                <h3><i class="fas fa-qrcode"></i> QR Code for Students</h3>
                <div class="qr-container">
                    <div id="qrPlaceholder" class="qr-placeholder">
                        <i class="fas fa-qrcode fa-3x mb-2"></i><br>
                        QR will appear here when session starts
                    </div>
                    <img id="qrImg" class="hidden" src="" alt="QR Code" style="width:250px; height:250px; margin:0 auto;">
                </div>
                <p id="qrMsg" style="color:green; margin-top:15px;"></p>
            </div>

            <div id="attendanceList" class="attendance-list hidden">
                <h3><i class="fas fa-users"></i> Attendance List</h3>
                <table class="attendance-table">
                    <thead>
                        <tr><th>Student Name</th><th>Time</th><th>Mode</th><th>Status</th></tr>
                    </thead>
                    <tbody id="attendanceTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="static/js/teacher-dashboard.js"></script>
</body>
</html>
